@let challenges = challengesData();

@if (challenges) {
  <div class="grid grid-cols-1 gap-4">
    @for (challenge of challenges; track challenge.id) {
      @if (challenge.status === challengeStatusEnum.Completed) {
        <app-challenge-card-completed [challengeData]="challenge"></app-challenge-card-completed>
      } @else {
        <app-challenge-card-active [challengeData]="challenge"></app-challenge-card-active>
      }
    }
  </div>
}
