<div
  class="fixed z-50 flex flex-col gap-2 bottom-4 max-md:left-1/2 max-md:-translate-x-1/2 max-md:w-[calc(100vw-2rem)] max-md:max-w-sm md:top-4 md:right-4 md:bottom-auto"
>
  @for (toast of toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 rounded-lg px-4 py-3 shadow-lg min-w-64 max-w-sm {{
        getTypeClasses(toast.type)
      }}"
    >
      <span class="flex-1 text-sm">{{ toast.message }}</span>
      <button
        type="button"
        class="shrink-0 opacity-80 hover:opacity-100 text-lg leading-none"
        (click)="messageService.remove(toast.id)"
      >
        &times;
      </button>
    </div>
  }
</div>
